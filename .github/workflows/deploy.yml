name: Deploy to Cloud Run

on:
  workflow_dispatch:

env:
  PROJECT_ID: hstia-agent
  REGION: us-central1
  SERVICE_NAME: vip-concierge
  IMAGE: us-central1-docker.pkg.dev/hstia-agent/cloud-run-source-deploy/vip-concierge

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker push
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push Docker image
        run: docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --vpc-connector=hub-connector \
            --vpc-egress=private-ranges-only \
            --allow-unauthenticated \
            --memory=512Mi \
            --timeout=120 \
            --set-env-vars="HR_DB_PASSWORD=${{ secrets.HR_DB_PASSWORD }},FIN_DB_PASSWORD=${{ secrets.FIN_DB_PASSWORD }}" \
            --project=${{ env.PROJECT_ID }}
